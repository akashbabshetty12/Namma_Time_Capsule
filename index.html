<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namma Time Capsule</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Lato', sans-serif;
    background: #f5f5f0;
    color: #333;
}

/* HERO */
.hero {
    background: linear-gradient(120deg, #c45e10 0%, #8b3a0f 25%, #1a2a4a 65%, #0a0f2e 100%);
    padding: 70px 40px 60px;
    text-align: center;
}

.hero-logo {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    margin-bottom: 24px;
    border: 3px solid #f0c08066;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: #f0ece0;
}

.hero h1 span {
    color: #f0c080;
}

.hero p {
    font-size: 16px;
    color: #c8c0b0;
    max-width: 520px;
    margin: 20px auto;
}

/* BUTTONS */
.hero-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.btn-primary, .btn-outline {
    padding: 12px 28px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 14px;
}

.btn-primary {
    background: #f0c080;
    color: #1a0a00;
}

.btn-outline {
    border: 1px solid #f0c08066;
    color: #f0c080;
}

/* STATS */
.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
}

.stat {
    padding: 28px;
    text-align: center;
    background: #fff;
}

.stat-num {
    font-size: 32px;
    color: #c45e10;
}

/* VIDEOS */
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    padding: 40px;
}

.video-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 200px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #0a0f2e;
    color: #f0c080;
}
</style>
</head>

<body>

<header class="hero">
    <img src="logo.png" class="hero-logo">
    <h1>Namma_Time_Capsule<br><span>Documenting today for tomorrow.</span></h1>
    <p>Real life. No filters. Just moments captured as they are.</p>

    <div class="hero-btns">
        <a class="btn-primary" href="https://youtube.com/@namma_time_capsule" target="_blank">Watch</a>
        <a class="btn-outline" href="https://youtu.be/eWFbChdlIAk" target="_blank">Explore</a>
    </div>
</header>

<!-- STATS -->
<div class="stats">
    <div class="stat">
        <div class="stat-num" id="videos">0</div>
        <div>Videos</div>
    </div>
    <div class="stat">
        <div class="stat-num" id="subs">0</div>
        <div>Subscribers</div>
    </div>
    <div class="stat">
        <div class="stat-num" id="locations">0</div>
        <div>Locations</div>
    </div>
</div>

<!-- VIDEOS -->
<div class="video-grid">
    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/eWFbChdlIAk"></iframe>
    </div>

    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/MhVamFZypCI"></iframe>
    </div>

    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/jOcj3luB8tQ"></iframe>
    </div>
</div>

<footer class="footer">
    © 2026 Namma Time Capsule
</footer>

<script>
// Simple animated counter
function animateValue(id, start, end, duration) {
    let range = end - start;
    let current = start;
    let increment = end > start ? 1 : -1;
    let stepTime = Math.abs(Math.floor(duration / range));

    let timer = setInterval(() => {
        current += increment;
        document.getElementById(id).innerText = current + "+";
        if (current == end) clearInterval(timer);
    }, stepTime);
}

// Run animation
animateValue("videos", 0, 6, 800);
animateValue("subs", 0, 24, 1000);
animateValue("locations", 0, 2, 600);
</script>

</body>
</html>
